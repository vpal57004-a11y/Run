<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏃 दौड़ ट्रैकर</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F5F3EE;
  --ink:#111111;
  --ink2:#555;
  --rule:#C8C4BC;
  --rule2:#E2DED8;
  --accent:#D4380D;
  --accent-bg:#FFF1EE;
  --white:#FFFFFF;
  --card-shadow:0 2px 12px rgba(0,0,0,0.08);
}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  min-height:100vh;
}

/* ── HEADER ── */
.header{
  background:var(--ink);
  color:#fff;
  padding:16px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;top:0;z-index:10;
}
.header-title{font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.header-date{font-size:11px;color:#888;letter-spacing:0.5px}

/* ── TABS ── */
.tabs{
  display:flex;
  border-bottom:2px solid var(--rule);
  background:var(--white);
}
.tab{
  flex:1;padding:12px;
  font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  background:none;border:none;cursor:pointer;color:var(--ink2);
  border-bottom:3px solid transparent;margin-bottom:-2px;
  transition:all .15s;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── SECTIONS ── */
.section{display:none;padding:20px 16px}
.section.active{display:block}

/* ── TODAY'S ENTRY CARD ── */
.entry-card{
  background:var(--white);
  border:1.5px solid var(--ink);
  max-width:420px;
  margin:0 auto;
  box-shadow:4px 4px 0 var(--ink);
}

/* card header stripe */
.card-stripe{
  background:var(--ink);
  color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.card-stripe-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.card-stripe-day{font-size:20px;font-weight:900;letter-spacing:-0.5px}

.card-body{padding:16px}
.field-row{
  display:flex;align-items:center;
  padding:11px 0;
  border-bottom:1px solid var(--rule2);
  gap:12px;
}
.field-row:last-child{border-bottom:none}
.field-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.field-label{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink2);
  flex:1;line-height:1.3;
}
.field-label small{display:block;font-size:9px;color:#aaa;font-weight:400;letter-spacing:0;text-transform:none;margin-top:1px}

/* time input */
.time-wrap{display:flex;align-items:center;gap:4px}
.time-input{
  width:44px;
  background:none;border:none;border-bottom:2px solid var(--ink);
  font-family:'Inter',sans-serif;font-size:22px;font-weight:800;
  color:var(--ink);text-align:center;outline:none;padding:2px 0;
}
.time-input::placeholder{color:var(--rule);font-weight:400}
.time-colon{font-size:22px;font-weight:800;color:var(--ink2)}
.time-unit-label{font-size:9px;color:#aaa;margin-left:4px}

/* yes/no toggle */
.yn-wrap{display:flex;gap:6px}
.yn-btn{
  border:1.5px solid var(--rule);
  background:none;
  font-family:'Inter',sans-serif;
  font-size:11px;font-weight:700;
  padding:5px 12px;border-radius:3px;
  cursor:pointer;color:var(--ink2);
  transition:all .15s;
}
.yn-btn.sel-yes{background:var(--ink);color:#fff;border-color:var(--ink)}
.yn-btn.sel-no{background:var(--accent);color:#fff;border-color:var(--accent)}

/* fatigue circles */
.fatigue-wrap{display:flex;gap:4px;flex-wrap:wrap}
.fc{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--rule);
  font-size:9px;font-weight:700;color:var(--ink2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;
  flex-shrink:0;
}
.fc.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
.fc[data-v="8"].sel,.fc[data-v="9"].sel,.fc[data-v="10"].sel{background:var(--accent);border-color:var(--accent)}

/* sprint buttons */
.sprint-wrap{display:flex;gap:6px}
.sprint-btn{
  flex:1;border:1.5px solid var(--rule);background:none;
  font-family:'Inter',sans-serif;
  padding:8px 4px;border-radius:3px;
  text-align:center;cursor:pointer;
  transition:all .15s;
}
.sprint-btn .s-arrow{font-size:18px;display:block;line-height:1}
.sprint-btn .s-text{font-size:10px;font-weight:700;color:var(--ink2);display:block;margin-top:3px}
.sprint-btn.sel{background:var(--ink);border-color:var(--ink)}
.sprint-btn.sel .s-text{color:#fff}

/* note input */
.note-input{
  width:100%;background:none;border:none;border-bottom:1.5px solid var(--rule);
  font-family:'Inter',sans-serif;font-size:13px;color:var(--ink);
  outline:none;padding:4px 0;
}
.note-input::placeholder{color:#ccc}

/* save btn */
.save-btn{
  width:100%;margin-top:16px;
  background:var(--ink);color:#fff;
  border:none;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  padding:14px;cursor:pointer;
  transition:background .15s;
}
.save-btn:hover{background:#333}
.save-btn:active{background:var(--accent)}

.already-saved{
  text-align:center;padding:12px;
  font-size:11px;color:var(--ink2);
  background:var(--accent-bg);
  border-top:1px solid #FBCAB7;
  letter-spacing:0.5px;
}

/* ── HISTORY ── */
.history-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;
}
.history-title{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink2)}
.clear-btn{font-size:11px;background:none;border:none;cursor:pointer;color:var(--accent);font-weight:700}

.log-list{display:flex;flex-direction:column;gap:12px;max-width:420px;margin:0 auto}

.log-card{
  background:var(--white);
  border:1.5px solid var(--ink);
  box-shadow:3px 3px 0 var(--rule);
  overflow:hidden;
}
.log-card-head{
  background:var(--ink);color:#fff;
  padding:8px 14px;
  display:flex;justify-content:space-between;align-items:center;
}
.log-date{font-size:10px;letter-spacing:1px;opacity:.7}
.log-time{font-size:22px;font-weight:900;letter-spacing:-0.5px}
.log-time small{font-size:10px;font-weight:400;opacity:.6;margin-left:2px}
.del-btn{background:none;border:none;color:rgba(255,255,255,0.4);font-size:18px;cursor:pointer;line-height:1}
.del-btn:hover{color:#fff}

.log-body{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px}
.log-tag{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:2px;
  letter-spacing:0.5px;
}
.tag-ok{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
.tag-warn{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.tag-mid{background:#FEFCE8;color:#854D0E;border:1px solid #FDE68A}
.tag-grey{background:#F1F5F9;color:#475569;border:1px solid #CBD5E1}
.tag-accent{background:var(--accent-bg);color:var(--accent);border:1px solid #FBCAB7}

.log-note{
  padding:0 14px 10px;
  font-size:11px;color:var(--ink2);
  font-style:italic;border-top:1px solid var(--rule2);
  padding-top:8px;
}

.empty-history{
  text-align:center;padding:40px 20px;
  color:var(--ink2);font-size:13px;
}
.empty-history .e-icon{font-size:36px;display:block;margin-bottom:8px}

/* toast */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--ink);color:#fff;
  font-size:12px;font-weight:700;letter-spacing:1px;
  padding:10px 20px;
  transition:transform .3s;z-index:99;
  pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🏃 दौड़ ट्रैकर</div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('today',this)">आज की दौड़</button>
  <button class="tab" onclick="showTab('history',this)">इतिहास</button>
</div>

<!-- TODAY -->
<div class="section active" id="tab-today">
  <div class="entry-card">
    <div class="card-stripe">
      <div>
        <div class="card-stripe-title">आज का लॉग</div>
        <div style="font-size:10px;color:#888;margin-top:2px" id="cardSubdate"></div>
      </div>
      <div class="card-stripe-day" id="cardDay"></div>
    </div>

    <div class="card-body">

      <!-- TIME -->
      <div class="field-row">
        <div class="field-icon">⏱</div>
        <div class="field-label">समय<small>Time (min:sec)</small></div>
        <div class="time-wrap">
          <input class="time-input" id="tMin" type="number" min="0" max="59" placeholder="00">
          <span class="time-colon">:</span>
          <input class="time-input" id="tSec" type="number" min="0" max="59" placeholder="00">
          <span class="time-unit-label">min:sec</span>
        </div>
      </div>

      <!-- WALK -->
      <div class="field-row">
        <div class="field-icon">🚶</div>
        <div class="field-label">बीच में चलना पड़ा?<small>Did you stop to walk?</small></div>
        <div class="yn-wrap">
          <button class="yn-btn" id="ynY" onclick="setYN('yes')">हाँ</button>
          <button class="yn-btn" id="ynN" onclick="setYN('no')">नहीं</button>
        </div>
      </div>

      <!-- FATIGUE -->
      <div class="field-row" style="flex-wrap:wrap;gap:8px">
        <div class="field-icon">😮‍💨</div>
        <div class="field-label">थकान<small>Fatigue (1–10)</small></div>
        <div class="fatigue-wrap" id="fatigueWrap"></div>
      </div>

      <!-- SPRINT -->
      <div class="field-row" style="flex-wrap:wrap;gap:8px">
        <div class="field-icon">🏁</div>
        <div class="field-label">आखिरी 400m स्पीड<small>Last 400m pace</small></div>
        <div class="sprint-wrap">
          <button class="sprint-btn" id="spUp" onclick="setSprint('up')">
            <span class="s-arrow">↑</span><span class="s-text">बढ़ी</span>
          </button>
          <button class="sprint-btn" id="spSame" onclick="setSprint('same')">
            <span class="s-arrow">→</span><span class="s-text">बराबर</span>
          </button>
          <button class="sprint-btn" id="spDown" onclick="setSprint('down')">
            <span class="s-arrow">↓</span><span class="s-text">घटी</span>
          </button>
        </div>
      </div>

      <!-- NOTE -->
      <div class="field-row">
        <div class="field-icon">📝</div>
        <div class="field-label">नोट<small>Optional note</small></div>
        <input class="note-input" id="noteInput" placeholder="कुछ लिखो…" maxlength="80">
      </div>

    </div>

    <button class="save-btn" id="saveBtn" onclick="saveRun()">✅ सेव करो</button>
    <div class="already-saved" id="savedMsg" style="display:none">✅ आज की दौड़ सेव हो गई है</div>
  </div>
</div>

<!-- HISTORY -->
<div class="section" id="tab-history">
  <div class="history-header">
    <div class="history-title">सभी दौड़ें</div>
    <button class="clear-btn" onclick="clearAll()">सब हटाओ</button>
  </div>
  <div class="log-list" id="logList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let walkVal = null;
let fatigueVal = null;
let sprintVal = null;

const TODAY = new Date().toISOString().split('T')[0]; // YYYY-MM-DD

// ── INIT ──
(function init(){
  const d = new Date();
  const days = ['रवि','सोम','मंगल','बुध','गुरु','शुक','शनि'];
  const months = ['जन','फ़र','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस'];
  document.getElementById('headerDate').textContent =
    days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()];
  document.getElementById('cardDay').textContent = d.getDate();
  document.getElementById('cardSubdate').textContent =
    days[d.getDay()] + ' · ' + months[d.getMonth()] + ' ' + d.getFullYear();

  // build fatigue circles
  const fw = document.getElementById('fatigueWrap');
  for(let i=1;i<=10;i++){
    const c = document.createElement('div');
    c.className='fc';c.dataset.v=i;c.textContent=i;
    c.onclick=()=>setFatigue(i);
    fw.appendChild(c);
  }

  // check if today already saved
  checkTodaySaved();
  renderHistory();
})();

function checkTodaySaved(){
  const runs = getRuns();
  const todayRun = runs.find(r=>r.date===TODAY);
  if(todayRun){
    // pre-fill
    document.getElementById('tMin').value = todayRun.min||'';
    document.getElementById('tSec').value = todayRun.sec||'';
    if(todayRun.walk) setYN(todayRun.walk);
    if(todayRun.fatigue) setFatigue(todayRun.fatigue);
    if(todayRun.sprint) setSprint(todayRun.sprint);
    document.getElementById('noteInput').value = todayRun.note||'';
    document.getElementById('saveBtn').style.display='none';
    document.getElementById('savedMsg').style.display='block';
  }
}

// ── TABS ──
function showTab(id, el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='history') renderHistory();
}

// ── TOGGLES ──
function setYN(v){
  walkVal=v;
  document.getElementById('ynY').className='yn-btn'+(v==='yes'?' sel-yes':'');
  document.getElementById('ynN').className='yn-btn'+(v==='no'?' sel-no':'');
}
function setFatigue(v){
  fatigueVal=v;
  document.querySelectorAll('.fc').forEach(c=>{
    c.classList.toggle('sel', parseInt(c.dataset.v)===v);
  });
}
function setSprint(v){
  sprintVal=v;
  ['Up','Same','Down'].forEach(k=>{
    document.getElementById('sp'+k).classList.toggle('sel', v===k.toLowerCase());
  });
}

// ── SAVE ──
function saveRun(){
  const min = parseInt(document.getElementById('tMin').value)||0;
  const sec = parseInt(document.getElementById('tSec').value)||0;
  if(!min && !sec){ toast('समय डालो पहले!'); return; }

  const run = {
    date: TODAY,
    min, sec,
    walk: walkVal,
    fatigue: fatigueVal,
    sprint: sprintVal,
    note: document.getElementById('noteInput').value.trim()
  };

  const runs = getRuns().filter(r=>r.date!==TODAY); // replace today if exists
  runs.unshift(run);
  localStorage.setItem('runlog_v2', JSON.stringify(runs));

  document.getElementById('saveBtn').style.display='none';
  document.getElementById('savedMsg').style.display='block';
  toast('✅ सेव हो गया!');
  renderHistory();
}

// ── STORAGE ──
function getRuns(){
  try{ return JSON.parse(localStorage.getItem('runlog_v2')||'[]'); }
  catch(e){ return []; }
}

function deleteRun(date){
  const runs = getRuns().filter(r=>r.date!==date);
  localStorage.setItem('runlog_v2', JSON.stringify(runs));
  if(date===TODAY){
    document.getElementById('saveBtn').style.display='block';
    document.getElementById('savedMsg').style.display='none';
    // reset form
    document.getElementById('tMin').value='';
    document.getElementById('tSec').value='';
    walkVal=null;fatigueVal=null;sprintVal=null;
    document.querySelectorAll('.yn-btn').forEach(b=>b.className='yn-btn');
    document.querySelectorAll('.fc').forEach(c=>c.classList.remove('sel'));
    document.querySelectorAll('.sprint-btn').forEach(b=>b.classList.remove('sel'));
    document.getElementById('noteInput').value='';
  }
  renderHistory();
}

function clearAll(){
  if(confirm('सारा इतिहास हटाएं?')){
    localStorage.removeItem('runlog_v2');
    renderHistory();
    // reset today
    document.getElementById('saveBtn').style.display='block';
    document.getElementById('savedMsg').style.display='none';
    walkVal=null;fatigueVal=null;sprintVal=null;
    document.querySelectorAll('.yn-btn').forEach(b=>b.className='yn-btn');
    document.querySelectorAll('.fc').forEach(c=>c.classList.remove('sel'));
    document.querySelectorAll('.sprint-btn').forEach(b=>b.classList.remove('sel'));
    document.getElementById('tMin').value='';
    document.getElementById('tSec').value='';
    document.getElementById('noteInput').value='';
  }
}

// ── RENDER HISTORY ──
function renderHistory(){
  const runs = getRuns();
  const list = document.getElementById('logList');
  if(!runs.length){
    list.innerHTML=`<div class="empty-history"><span class="e-icon">👟</span>अभी कोई दौड़ नहीं जोड़ी</div>`;
    return;
  }

  const days=['रवि','सोम','मंगल','बुध','गुरु','शुक','शनि'];
  const months=['जन','फ़र','मार्च','अप्रैल','मई','जून','जुलाई','अग','सित','अक्टू','नव','दिस'];

  list.innerHTML = runs.map(r=>{
    const d = new Date(r.date+'T00:00:00');
    const dateStr = days[d.getDay()]+', '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
    const timeStr = String(r.min).padStart(2,'0')+':'+String(r.sec).padStart(2,'0');
    const isToday = r.date===TODAY;

    // tags
    let tags = '';
    if(r.walk==='yes') tags+=`<span class="log-tag tag-warn">🚶 चला</span>`;
    if(r.walk==='no')  tags+=`<span class="log-tag tag-ok">🏃 नहीं रुका</span>`;
    if(r.fatigue){
      const fc = r.fatigue<=3?'tag-ok':r.fatigue<=6?'tag-mid':'tag-warn';
      tags+=`<span class="log-tag ${fc}">थकान ${r.fatigue}/10</span>`;
    }
    if(r.sprint==='up')   tags+=`<span class="log-tag tag-ok">🚀 स्पीड बढ़ी</span>`;
    if(r.sprint==='same') tags+=`<span class="log-tag tag-grey">→ बराबर</span>`;
    if(r.sprint==='down') tags+=`<span class="log-tag tag-warn">📉 स्पीड घटी</span>`;
    if(isToday) tags+=`<span class="log-tag tag-accent">आज</span>`;

    const noteHtml = r.note ? `<div class="log-note">"${r.note}"</div>` : '';

    return `
      <div class="log-card">
        <div class="log-card-head">
          <div>
            <div class="log-date">${dateStr}</div>
            <div class="log-time">${timeStr}<small>min</small></div>
          </div>
          <button class="del-btn" onclick="deleteRun('${r.date}')">×</button>
        </div>
        <div class="log-body">${tags||'<span class="log-tag tag-grey">—</span>'}</div>
        ${noteHtml}
      </div>`;
  }).join('');
}

// ── TOAST ──
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
</script>
</body>
</html>
